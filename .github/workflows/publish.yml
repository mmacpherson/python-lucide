name: Publish Python Package

on:
  release:
    types: [created]
  # Optionally allow manual triggering
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      # This permission is needed for private packages
      contents: write
      id-token: write  # This is required for OIDC publishing

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Build package
      run: |
        uv build --no-sources

    - name: Verify package can be installed
      run: |
        # Test that the built package can be installed and imported
        uv run --with ./dist/*.whl --no-project -- python -c "import lucide; print('✅ Package imports successfully')"

      # --check-url skips files already on PyPI, so a release-created run
      # after a manual dispatch (or a re-run) doesn't fail on duplicates
    - name: Publish package to PyPI
      run: |
        uv publish --check-url https://pypi.org/simple/

    # Optional: Create GitHub Release with assets
    - name: Upload assets to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v3
      with:
        files: |
          dist/*.tar.gz
          dist/*.whl

    - name: Build and publish search database
      if: github.event_name == 'release'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        uv sync --dev
        # The committed JSONL + clusters JSON are kept current by the weekly
        # update workflow; the release only derives the DB from them (no
        # Gemini calls, no theme drift from the committed clusters).
        make build-search

        SEARCH_DB=src/lucide/data/lucide-search.db
        if [ ! -f "$SEARCH_DB" ]; then
          echo "⚠️ Search database not built, skipping"
          exit 0
        fi

        LUCIDE_VERSION=$(sqlite3 "$SEARCH_DB" "SELECT value FROM metadata WHERE key='version';")
        RELEASE_TAG="search-v${LUCIDE_VERSION}"
        echo "Publishing search DB for Lucide v${LUCIDE_VERSION} → ${RELEASE_TAG}"

        # Create the search-data release if it doesn't already exist
        gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
          gh release create "$RELEASE_TAG" \
            --title "Search data for Lucide v${LUCIDE_VERSION}" \
            --notes "Pre-built semantic search database for Lucide icons v${LUCIDE_VERSION}. Downloaded automatically by \`python-lucide[search]\` on first use."

        gh release upload "$RELEASE_TAG" "$SEARCH_DB" --clobber
        echo "✅ Uploaded lucide-search.db to release ${RELEASE_TAG}"
