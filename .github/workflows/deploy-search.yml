name: Deploy Search App

on:
  push:
    branches: [main]
    paths:
    - src/lucide/data/**
    - web/**
    - .github/workflows/deploy-search.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    # Normal runs finish in well under 10 minutes; a flaky download once
    # hung a build for hours, so fail fast instead.
    timeout-minutes: 15
    steps:
    - uses: actions/checkout@v7

    - name: Set up Python
      uses: actions/setup-python@v7
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python dependencies
      run: uv sync

      # The web app consumes the released search DB — the same asset pip
      # users download — so browser search scores against byte-identical
      # vectors and the deploy computes no embeddings at all. The latest
      # search-v* release may lag the repo's data files; that staleness
      # matches what installed packages see and heals on the next release.
    - name: Download latest released search DB
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG=$(gh release list --limit 100 --json tagName \
          --jq '[.[] | select(.tagName | startswith("search-v"))][0].tagName')
        if [ -z "$TAG" ]; then
          echo "No search-v* release found" >&2
          exit 1
        fi
        echo "Using release $TAG"
        # Asset name must match config.SEARCH_DB_URL_TEMPLATE
        gh release download "$TAG" --pattern lucide-search.db \
          --output src/lucide/data/lucide-search.db

    - name: Set up Node
      uses: actions/setup-node@v7
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install Node dependencies
      run: npm ci
      working-directory: web

    - name: Export icon data and embeddings
      run: uv run python web/scripts/export-data.py

    - name: Build Vite app
      run: npm run build
      working-directory: web

    - name: Setup Pages
      uses: actions/configure-pages@v6

      # The Vite build is the whole site: the app at the root, plus the
      # /search/ redirect stub from web/public (old PyPI READMEs link there)
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v5
      with:
        path: web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
