name: Deploy Search App

on:
  push:
    branches: [main]
    paths:
    - src/lucide/data/**
    - web/**
    - docs/**
    - .github/workflows/deploy-search.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Install Python dependencies
      run: uv sync

      # The search DB is not in git — derive it from the committed JSONL +
      # clusters JSON. Embedding runs locally via fastembed; no API key needed.
    - name: Build search database
      run: make build-search

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: npm
        cache-dependency-path: web/package-lock.json

    - name: Install Node dependencies
      run: npm ci
      working-directory: web

    - name: Export icon data
      run: uv run python web/scripts/export-data.py

    - name: Compute embeddings
      run: node scripts/compute-embeddings.mjs
      working-directory: web

    - name: Build Vite app
      run: npm run build
      working-directory: web

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Build Jekyll
      uses: actions/jekyll-build-pages@v1
      with:
        source: docs
        destination: ./_site

      # Jekyll excludes search/ — copy the Vite output back in. The Jekyll
      # action runs in a Docker container as root, so _site is root-owned
      # and the copy needs sudo.
    - name: Merge search app into site
      run: sudo cp -r docs/search _site/search

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
